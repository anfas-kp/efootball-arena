<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PDF Export{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Arial', sans-serif;
        }
        #pdf-content {
            background-color: white;
            padding: 40px;
            margin: 20px auto;
            max-width: 900px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .pdf-header {
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .pdf-header h1 {
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .pdf-header h4 {
            color: #7f8c8d;
            margin-bottom: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px 8px;
            text-align: left;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #bdc3c7;
        }
        tr:nth-child(even) {
            background-color: #ecf0f1;
        }
        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.8rem;
            color: #95a5a6;
            border-top: 1px solid #bdc3c7;
            padding-top: 10px;
        }
        /* Hide action buttons during export */
        .no-print {
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>

    <div class="no-print">
        <button onclick="generatePDF()" class="btn btn-primary btn-lg">📥 Download PDF Now</button>
        <a href="javascript:history.back()" class="btn btn-secondary btn-lg">Go Back</a>
    </div>

    <div id="pdf-content">
        <div class="pdf-header">
            <h1>{% block header_title %}E-Football Arena{% endblock %}</h1>
            <h4>{% block sub_title %}Official Document{% endblock %}</h4>
        </div>

        {% block content %}{% endblock %}

        <div class="footer">
            Generated on {% now "F j, Y, g:i a" %} | E-Football Tournament Management System
        </div>
    </div>

    <script>
        function generatePDF() {
            const element = document.getElementById('pdf-content');
            const opt = {
                margin:       [0.5, 0.5, 0.5, 0.5],
                filename:     '{% block filename %}export.pdf{% endblock %}',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Auto-trigger download on load
        window.onload = function() {
            setTimeout(generatePDF, 500);
        };
    </script>
</body>
</html>
