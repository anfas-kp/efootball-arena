{% extends "base.html" %}
{% block title %}Add Player - eFootball Arena{% endblock %}
{% block content %}
<div class="page-header" style="margin-top:60px;"><div class="container"><h1><i class="fas fa-user-plus me-2" style="color:var(--accent);"></i>Add Player to {{ team.name }}</h1></div></div>
<div class="container"><div class="row justify-content-center"><div class="col-lg-7">
    <div class="glass-card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% for e in field.errors %}<small class="text-danger">{{ e }}</small>{% endfor %}</div>
            {% endfor %}
            <button type="submit" class="btn-glow"><i class="fas fa-plus me-2"></i>Add Player</button>
            <a href="{% url 'teams:my_team' %}" class="btn-outline-glow ms-2">Cancel</a>
        </form>
    </div>
</div></div></div>
{% endblock %}
