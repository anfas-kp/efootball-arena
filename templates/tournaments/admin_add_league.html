{% extends "base.html" %}
{% block title %}Add League - Admin{% endblock %}
{% block content %}
<div class="page-header" style="margin-top:60px;"><div class="container"><h1><i class="fas fa-layer-group me-2" style="color:var(--accent);"></i>Add League to {{ tournament.name }}</h1></div></div>
<div class="container"><div class="row justify-content-center"><div class="col-lg-6">
    <div class="glass-card">
        <form method="post">{% csrf_token %}
            {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
            <button type="submit" class="btn-glow"><i class="fas fa-plus me-2"></i>Add League</button>
            <a href="{% url 'tournaments:tournament_detail' tournament.pk %}" class="btn-outline-glow ms-2">Cancel</a>
        </form>
    </div>
</div></div></div>
{% endblock %}
