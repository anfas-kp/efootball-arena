{% extends "base.html" %}
{% block title %}Edit {{ tournament.name }} - Admin{% endblock %}
{% block content %}
<div class="page-header" style="margin-top:60px;"><div class="container"><h1><i class="fas fa-edit me-2" style="color:var(--accent-2);"></i>Edit: {{ tournament.name }}</h1></div></div>
<div class="container"><div class="row justify-content-center"><div class="col-lg-8">
    <div class="glass-card">
        <form method="post" enctype="multipart/form-data">{% csrf_token %}
            {% for field in form %}
            <div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% for e in field.errors %}<small class="text-danger">{{ e }}</small>{% endfor %}</div>
            {% endfor %}
            <button type="submit" class="btn-glow"><i class="fas fa-save me-2"></i>Save Changes</button>
            <a href="{% url 'tournaments:tournament_detail' tournament.pk %}" class="btn-outline-glow ms-2">Cancel</a>
        </form>
    </div>
</div></div></div>
{% endblock %}
